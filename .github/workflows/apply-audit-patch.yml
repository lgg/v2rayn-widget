name: Apply Audit Patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'audit/0017-final-post-merge-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          cat .github/audit/0017-part*.b64 > /tmp/0017.patch.gz.b64
          printf '%s  %s\n' '7e8c2933bb5d990312106955e5cd7e4d38f1a6cd05befd07b78275f40d53312a' /tmp/0017.patch.gz.b64 | sha256sum --check -
          base64 --decode /tmp/0017.patch.gz.b64 | gzip -d > /tmp/0017.patch
          printf '%s  %s\n' '26d484def27d3bba530059cf63dc45a9e33c4d3e35244bf247c0ecd1a3df7ebe' /tmp/0017.patch | sha256sum --check -
          git apply --check /tmp/0017.patch
          git apply /tmp/0017.patch

      - name: Format Rust
        run: cargo fmt --all --manifest-path src/tauri/Cargo.toml

      - name: Remove temporary audit tooling
        shell: bash
        run: |
          rm -rf .github/audit
          rm -f .github/workflows/audit-source-snapshot.yml
          rm -f .github/workflows/apply-audit-patch.yml

      - name: Commit audit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "0017: harden final post-merge runtime paths"
          git push origin HEAD:${{ github.head_ref }}
