name: Finalize 0014 DNS Timeout

on:
  pull_request:
    paths:
      - '.github/workflows/finalize-0014-dns-timeout.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'audit/0014-post-merge-hardening'
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/0014-post-merge-hardening
          fetch-depth: 0

      - name: Set up rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Bound DNS resolution and format
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/tauri/src/services/health_check.rs')
          content = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '    time::Instant,',
                  '    time::{Duration, Instant},',
              ),
              (
                  '    let resolved = tokio::net::lookup_host((host.as_str(), port)).await.ok()?;',
                  '    let resolved = tokio::time::timeout(\n        Duration::from_secs(REQUEST_TIMEOUT_SECONDS),\n        tokio::net::lookup_host((host.as_str(), port)),\n    )\n    .await\n    .ok()?\n    .ok()?;',
              ),
              (
                  '        .timeout(std::time::Duration::from_secs(REQUEST_TIMEOUT_SECONDS))',
                  '        .timeout(Duration::from_secs(REQUEST_TIMEOUT_SECONDS))',
              ),
          ]
          for old, new in replacements:
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'expected one occurrence, found {count}: {old!r}')
              content = content.replace(old, new, 1)
          path.write_text(content, encoding='utf-8')

      - name: Format Rust source
        working-directory: src/tauri
        shell: pwsh
        run: |
          rustfmt --edition 2021 --config skip_children=true src/services/health_check.rs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit DNS timeout
        shell: pwsh
        run: |
          git diff --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git config user.name 'lgg'
          git config user.email 'lgg@users.noreply.github.com'
          git add src/tauri/src/services/health_check.rs
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m '0014: bound diagnostic DNS resolution time'
          git push origin HEAD:audit/0014-post-merge-hardening
