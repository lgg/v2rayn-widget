name: Audit Source Snapshot

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'audit/0018-full-project-screen-audit' || github.ref_name == 'audit/0018-full-project-screen-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact audit head
        uses: actions/checkout@v4

      - name: Create tracked-source archive
        shell: bash
        run: |
          git ls-files -z | tar --null -T - -czf audit-source.tar.gz
          printf 'head=%s\n' "$(git rev-parse HEAD)" > audit-source-metadata.txt
          printf 'tracked_files=%s\n' "$(git ls-files | wc -l)" >> audit-source-metadata.txt

      - name: Upload audit source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: audit-source-snapshot
          path: |
            audit-source.tar.gz
            audit-source-metadata.txt
          retention-days: 1
          if-no-files-found: error
