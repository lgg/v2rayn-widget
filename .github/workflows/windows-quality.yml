name: Release Quality

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, v2rayn-widget-ci]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Confirm self-hosted runner assignment
        shell: pwsh
        run: |
          Write-Host "Runner name: ${{ runner.name }}"
          Write-Host "Runner OS: ${{ runner.os }}"
          Write-Host "Runner architecture: ${{ runner.arch }}"
          if ("${{ runner.environment }}" -ne "self-hosted") {
            throw "Release Quality must run on the self-hosted v2rayn-widget-ci runner"
          }

      - name: Verify pre-provisioned Node.js
        shell: pwsh
        run: ./scripts/assert-ci-prerequisites.ps1 -RequireNode

      - name: Verify workflow contracts
        shell: pwsh
        run: node scripts/test-workflow-contracts.mjs

      - name: Restore frontend dependencies locally
        id: frontend_install
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          $env:NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
          $env:NPM_CONFIG_CACHE = Join-Path $env:RUNNER_TEMP "npm-cache"
          npm ci --ignore-scripts --no-audit --no-fund 2>&1 | Tee-Object -FilePath frontend-install-output.txt
          exit $LASTEXITCODE

      - name: Verify locked Tauri CLI and immutable NSIS cache
        if: steps.frontend_install.outcome == 'success'
        id: release_prerequisites
        continue-on-error: true
        shell: pwsh
        run: ./scripts/assert-ci-prerequisites.ps1 -RequireTauriCli -RequireNsis

      - name: Audit frontend dependencies
        if: steps.frontend_install.outcome == 'success'
        id: frontend_audit
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          $env:NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
          $env:NPM_CONFIG_CACHE = Join-Path $env:RUNNER_TEMP "npm-cache"
          npm audit --audit-level=high 2>&1 | Tee-Object -FilePath frontend-audit-output.txt
          exit $LASTEXITCODE

      - name: Run frontend tests
        if: steps.frontend_install.outcome == 'success'
        id: frontend_tests
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath frontend-test-output.txt
          exit $LASTEXITCODE

      - name: Build frontend
        if: steps.frontend_install.outcome == 'success'
        id: frontend_build
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath frontend-build-output.txt
          exit $LASTEXITCODE

      - name: Upload frontend distribution
        if: steps.frontend_build.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-dist
          path: src/frontend/dist
          if-no-files-found: error
          retention-days: 1

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-diagnostics
          path: |
            src/frontend/frontend-install-output.txt
            src/frontend/frontend-audit-output.txt
            src/frontend/frontend-test-output.txt
            src/frontend/frontend-build-output.txt
            ${{ runner.temp }}/npm-cache/_logs/*.log
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when frontend checks failed
        if: steps.frontend_install.outcome == 'failure' || steps.release_prerequisites.outcome == 'failure' || steps.frontend_audit.outcome == 'failure' || steps.frontend_tests.outcome == 'failure' || steps.frontend_build.outcome == 'failure'
        shell: pwsh
        run: exit 1

      - name: Cleanup frontend workspace and cache
        if: always()
        shell: pwsh
        run: |
          Remove-Item "src/frontend/node_modules" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src/frontend/dist" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:RUNNER_TEMP "npm-cache") -Recurse -Force -ErrorAction SilentlyContinue

  rust-windows:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository)
    needs: frontend
    runs-on: [self-hosted, v2rayn-widget-ci]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Confirm self-hosted runner assignment
        shell: pwsh
        run: |
          Write-Host "Runner name: ${{ runner.name }}"
          Write-Host "Runner OS: ${{ runner.os }}"
          Write-Host "Runner architecture: ${{ runner.arch }}"
          if ("${{ runner.environment }}" -ne "self-hosted") {
            throw "Release Quality must run on the self-hosted v2rayn-widget-ci runner"
          }

      - name: Download frontend distribution
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-dist
          path: src/frontend/dist

      - name: Verify pre-provisioned Rust and MSVC
        shell: pwsh
        run: ./scripts/assert-ci-prerequisites.ps1 -RequireRust

      - name: Check all Rust formatting
        id: rust_format
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          cargo fmt --all -- --check 2>&1 | Tee-Object -FilePath rust-format-output.txt
          exit $LASTEXITCODE

      - name: Run Rust tests
        id: rust_tests
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          cargo test --locked 2>&1 | Tee-Object -FilePath rust-test-output.txt
          exit $LASTEXITCODE

      - name: Run Rust clippy
        id: rust_clippy
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          cargo clippy --locked --all-targets -- -D warnings 2>&1 | Tee-Object -FilePath rust-clippy-output.txt
          exit $LASTEXITCODE

      - name: Run release configuration Clippy
        id: rust_release_clippy
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          cargo clippy --locked --release --no-default-features -- -D warnings 2>&1 | Tee-Object -FilePath rust-release-clippy-output.txt
          exit $LASTEXITCODE

      - name: Check Rust build
        id: rust_build
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          cargo check --locked 2>&1 | Tee-Object -FilePath rust-build-output.txt
          exit $LASTEXITCODE

      - name: Build portable release smoke artifact
        id: rust_release
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          cargo build --release --locked 2>&1 | Tee-Object -FilePath rust-release-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "target/release/v2rayn-widget.exe")) {
            Write-Error "Release executable was not produced"
            exit 1
          }

      - name: Upload portable release smoke artifact
        if: steps.rust_release.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: portable-release-smoke
          path: src/tauri/target/release/v2rayn-widget.exe
          if-no-files-found: error
          retention-days: 1

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rust-diagnostics
          path: |
            src/tauri/rust-format-output.txt
            src/tauri/rust-test-output.txt
            src/tauri/rust-clippy-output.txt
            src/tauri/rust-release-clippy-output.txt
            src/tauri/rust-build-output.txt
            src/tauri/rust-release-output.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when Rust checks failed
        if: steps.rust_format.outcome == 'failure' || steps.rust_tests.outcome == 'failure' || steps.rust_clippy.outcome == 'failure' || steps.rust_release_clippy.outcome == 'failure' || steps.rust_build.outcome == 'failure' || steps.rust_release.outcome == 'failure'
        shell: pwsh
        run: exit 1

      - name: Cleanup Rust workspace
        if: always()
        shell: pwsh
        run: |
          Remove-Item "src/frontend/dist" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src/tauri/target" -Recurse -Force -ErrorAction SilentlyContinue
