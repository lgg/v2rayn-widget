name: Apply 0014 Audit Patch

on:
  pull_request:
    paths:
      - '.github/workflows/apply-0014-audit.yml'
      - '.audit/0014.patch.gz.b64'

permissions:
  contents: write

concurrency:
  group: apply-0014-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/0014-post-merge-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/0014-post-merge-hardening
          fetch-depth: 0

      - name: Decode and apply audited patch
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .audit/0014.patch.gz.b64 | gzip -d > /tmp/0014.patch
          patch -p1 --forward --batch < /tmp/0014.patch
          rm -f .audit/0014.patch.gz.b64
          rmdir .audit 2>/dev/null || true
          rm -f .github/workflows/audit-source-snapshot.yml
          rm -f .github/workflows/apply-0014-audit.yml
          git diff --check

      - name: Commit exact audited tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "lgg"
          git config user.email "lgg@users.noreply.github.com"
          git add -A
          git commit -m "0014: harden merged adapter implementation"
          git push origin HEAD:audit/0014-post-merge-hardening
