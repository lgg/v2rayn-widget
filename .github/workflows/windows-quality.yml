name: Apply 0022 Audit Fixes

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit/0022-full-project-verification'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout exact audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/0022-full-project-verification
          fetch-depth: 0

      - name: Set up Rust formatting
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply exact verified replacements
        run: python3 scripts/apply_0022_audit_fixes.py

      - name: Restore permanent workflow, verify and push
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/windows-quality.yml
          rm scripts/apply_0022_audit_fixes.py
          cargo fmt --all --manifest-path src/tauri/Cargo.toml
          git diff --check
          grep -F 'getVersion().catch(() => null)' src/frontend/src/app/SettingsWindow.tsx
          ! grep -F 'const APP_VERSION' src/frontend/src/app/SettingsWindow.tsx
          grep -F 'restore_or_center(&window, bounds)' src/tauri/src/main.rs
          grep -F 'ConnectionState::Unknown' src/tauri/src/services/status_service.rs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m '0022: fix verified full-audit findings'
          git push origin HEAD:audit/0022-full-project-verification
