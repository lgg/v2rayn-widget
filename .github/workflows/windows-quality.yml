name: Windows Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run frontend tests
        id: frontend_tests
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath frontend-test-output.txt
          exit $LASTEXITCODE

      - name: Upload frontend test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-output
          path: src/frontend/frontend-test-output.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Fail when frontend tests failed
        if: steps.frontend_tests.outcome == 'failure'
        shell: pwsh
        run: exit 1

  rust:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        working-directory: src/tauri
        run: cargo fmt --all -- --check

      - name: Run Rust tests
        working-directory: src/tauri
        run: cargo test --locked

      - name: Check Rust build
        working-directory: src/tauri
        run: cargo check --locked
