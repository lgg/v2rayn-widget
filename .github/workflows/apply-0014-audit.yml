name: Cleanup 0014 Audit Payload

on:
  pull_request:
    paths:
      - '.github/workflows/apply-0014-audit.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.ref == 'audit/0014-post-merge-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/0014-post-merge-hardening
          fetch-depth: 0

      - name: Remove temporary audit payload
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audit
          git config user.name 'lgg'
          git config user.email 'lgg@users.noreply.github.com'
          git add -A .audit
          git commit -m '0014: remove temporary audit payload'
          git push origin HEAD:audit/0014-post-merge-hardening
