name: Apply Deep Audit Fixes

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: apply-deep-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply audited changes
        shell: bash
        run: |
          set -euo pipefail
          cat .audit/part1.patch .audit/part2.patch .audit/part3.patch .audit/part4.patch > /tmp/deep-audit.patch
          git apply --check /tmp/deep-audit.patch
          git apply --whitespace=fix /tmp/deep-audit.patch
          rm -rf .audit

      - name: Commit audited changes
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fix: harden proxy adapters after deep audit"
          git push origin "HEAD:${HEAD_BRANCH}"
