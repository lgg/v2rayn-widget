name: Build Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build when no release tag is supplied
        required: true
        default: main
        type: string
      release_tag:
        description: Existing release tag to build and attach assets to (optional)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-assets-${{ github.event.release.tag_name || inputs.release_tag || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: [self-hosted, v2rayn-widget-ci]
    timeout-minutes: 90
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      version: ${{ steps.metadata.outputs.version }}
    env:
      BUILD_REF: ${{ github.event.release.tag_name || inputs.release_tag || inputs.ref }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

    steps:
      - name: Checkout exact release ref
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ env.BUILD_REF }}
          persist-credentials: false

      - name: Confirm self-hosted runner assignment
        shell: pwsh
        run: |
          Write-Host "Runner name: ${{ runner.name }}"
          Write-Host "Runner OS: ${{ runner.os }}"
          Write-Host "Runner architecture: ${{ runner.arch }}"
          if ("${{ runner.environment }}" -ne "self-hosted") {
            throw "Windows release builds must run on the self-hosted v2rayn-widget-ci runner"
          }

      - name: Verify pre-provisioned release toolchain
        shell: pwsh
        run: ./scripts/assert-ci-prerequisites.ps1 -RequireNode -RequireRust -RequireNsis

      - name: Resolve and verify release version
        id: metadata
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          $metadata = cargo metadata --manifest-path src/tauri/Cargo.toml --no-deps --format-version 1 | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "Could not read Cargo package metadata"
          }

          $package = $metadata.packages | Where-Object { $_.name -eq "v2rayn-widget" } | Select-Object -First 1
          if (-not $package) {
            throw "v2rayn-widget package was not found in Cargo metadata"
          }

          $cargoVersion = $package.version
          $tauriVersion = (Get-Content src/tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($cargoVersion -ne $tauriVersion) {
            throw "Cargo version $cargoVersion does not match Tauri version $tauriVersion"
          }

          if ($env:RELEASE_TAG) {
            if ($env:RELEASE_TAG -notmatch '^v?(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$') {
              throw "Release tag '$env:RELEASE_TAG' must be a semantic version such as v1.2.3"
            }
            $tagVersion = $Matches[1]
            if ($tagVersion -ne $cargoVersion) {
              throw "Release tag version $tagVersion does not match application version $cargoVersion"
            }
            $assetLabel = $env:RELEASE_TAG
          }
          else {
            $assetLabel = "v$($cargoVersion)-manual-$env:GITHUB_RUN_NUMBER"
          }

          $safeAssetLabel = $assetLabel -replace '[^0-9A-Za-z._-]', '-'
          $artifactName = "release-assets-$safeAssetLabel"
          "version=$cargoVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=$env:RELEASE_TAG" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore and audit frontend dependencies locally
        working-directory: src/frontend
        shell: pwsh
        run: |
          $env:NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
          $env:NPM_CONFIG_CACHE = Join-Path $env:RUNNER_TEMP "npm-release-cache"
          npm ci --ignore-scripts --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm audit --audit-level=high
          exit $LASTEXITCODE

      - name: Verify locked Tauri CLI
        shell: pwsh
        run: ./scripts/assert-ci-prerequisites.ps1 -RequireTauriCli

      - name: Build frontend distribution
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm run build
          exit $LASTEXITCODE

      - name: Build portable Windows executable
        working-directory: src/tauri
        shell: pwsh
        run: |
          . "$env:GITHUB_WORKSPACE/scripts/rust-env.ps1" -UseGlobalHomes
          cargo build --release --locked
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "target/release/v2rayn-widget.exe")) {
            throw "Portable release executable was not produced"
          }

      - name: Build and inspect NSIS installer without tool provisioning
        working-directory: src/tauri
        shell: pwsh
        run: |
          $sourceFingerprint = Join-Path $env:RUNNER_TEMP "nsis-source.sha256"
          $beforeFingerprint = Join-Path $env:RUNNER_TEMP "nsis-before.sha256"
          $afterFingerprint = Join-Path $env:RUNNER_TEMP "nsis-after.sha256"
          $sourceNsis = Join-Path $env:LOCALAPPDATA "tauri\NSIS"
          $isolatedLocalAppData = Join-Path $env:RUNNER_TEMP "tauri-release-localappdata"
          $isolatedTauriRoot = Join-Path $isolatedLocalAppData "tauri"

          & "$env:GITHUB_WORKSPACE/scripts/assert-ci-prerequisites.ps1" -RequireRust -RequireTauriCli -RequireNsis -WriteNsisFingerprint $sourceFingerprint

          Remove-Item -LiteralPath $isolatedLocalAppData -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $isolatedTauriRoot | Out-Null
          Copy-Item -LiteralPath $sourceNsis -Destination $isolatedTauriRoot -Recurse -Force
          $env:LOCALAPPDATA = $isolatedLocalAppData

          & "$env:GITHUB_WORKSPACE/scripts/assert-ci-prerequisites.ps1" -RequireNsis -WriteNsisFingerprint $beforeFingerprint
          if ((Get-Content -LiteralPath $sourceFingerprint -Raw) -ne (Get-Content -LiteralPath $beforeFingerprint -Raw)) {
            throw "The isolated NSIS cache copy does not match the validated source cache."
          }

          $env:CARGO_NET_OFFLINE = "true"
          $tauriCli = (Resolve-Path "../frontend/node_modules/.bin/tauri.cmd").Path
          & $tauriCli build --bundles nsis --config "tauri.installer.conf.json" --ci -- --locked
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & "$env:GITHUB_WORKSPACE/scripts/assert-ci-prerequisites.ps1" -RequireNsis -WriteNsisFingerprint $afterFingerprint
          if ((Get-Content -LiteralPath $beforeFingerprint -Raw) -ne (Get-Content -LiteralPath $afterFingerprint -Raw)) {
            throw "The isolated Tauri NSIS cache changed during packaging. Release jobs must not download, repair or mutate bundler tools."
          }

          $installerScripts = @(Get-ChildItem "target/release/nsis" -Filter "installer.nsi" -File -Recurse -ErrorAction SilentlyContinue)
          if ($installerScripts.Count -ne 1) {
            throw "Expected exactly one generated installer.nsi, found $($installerScripts.Count)."
          }
          $installerScriptText = Get-Content -LiteralPath $installerScripts[0].FullName -Raw
          if ($installerScriptText -notmatch '(?mi)^\s*RequestExecutionLevel\s+user\s*$') {
            throw "Generated NSIS script is not explicitly current-user only."
          }
          if ($installerScriptText -match '(?i)MicrosoftEdgeWebview2Setup\.exe|WebView2Bootstrapper\.exe') {
            throw "Generated NSIS script contains a WebView2 installer payload."
          }

          $installers = @(Get-ChildItem "target/release/bundle/nsis/*.exe" -File -ErrorAction SilentlyContinue)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer, found $($installers.Count)."
          }

      - name: Stage distribution files and checksums
        shell: pwsh
        run: |
          $version = "${{ steps.metadata.outputs.version }}"
          $distributionDir = Join-Path $env:GITHUB_WORKSPACE "dist/release"
          if (Test-Path $distributionDir) {
            Remove-Item $distributionDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $distributionDir -Force | Out-Null

          $portableSource = Join-Path $env:GITHUB_WORKSPACE "src/tauri/target/release/v2rayn-widget.exe"
          $portableName = "v2rayn-widget-$version-windows-x64-portable.exe"
          $portableTarget = Join-Path $distributionDir $portableName
          Copy-Item $portableSource $portableTarget -Force

          $portableZip = Join-Path $distributionDir "v2rayn-widget-$version-windows-x64-portable.zip"
          Compress-Archive -Path $portableTarget -DestinationPath $portableZip -CompressionLevel Optimal -Force

          $installers = @(Get-ChildItem (Join-Path $env:GITHUB_WORKSPACE "src/tauri/target/release/bundle/nsis/*.exe") -File -ErrorAction SilentlyContinue)
          if ($installers.Count -ne 1) {
            throw "Expected exactly one NSIS installer for staging, found $($installers.Count)."
          }
          $installerTarget = Join-Path $distributionDir "v2rayn-widget-$version-windows-x64-setup.exe"
          Copy-Item $installers[0].FullName $installerTarget -Force

          $checksumLines = Get-ChildItem $distributionDir -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash *$($_.Name)"
            }
          $checksumLines | Set-Content (Join-Path $distributionDir "SHA256SUMS.txt") -Encoding ascii

          $distributionFiles = @(Get-ChildItem $distributionDir -File)
          if ($distributionFiles.Count -ne 4) {
            throw "Expected exactly four release distribution files, found $($distributionFiles.Count)."
          }
          $distributionFiles | Select-Object Name, Length

      - name: Upload release distribution artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup Windows release workspace and caches
        if: always()
        shell: pwsh
        run: |
          Remove-Item "src/frontend/node_modules" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src/frontend/dist" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src/tauri/target" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "dist/release" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:RUNNER_TEMP "npm-release-cache") -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:RUNNER_TEMP "tauri-release-localappdata") -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:RUNNER_TEMP "nsis-source.sha256") -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:RUNNER_TEMP "nsis-before.sha256") -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:RUNNER_TEMP "nsis-after.sha256") -Force -ErrorAction SilentlyContinue

  publish-release:
    if: needs.build-windows.outputs.release_tag != ''
    needs: build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.build-windows.outputs.release_tag }}
      VERSION: ${{ needs.build-windows.outputs.version }}

    steps:
      - name: Download verified release distribution
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.build-windows.outputs.artifact_name }}
          path: dist/release

      - name: Verify and attach files to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          readonly distribution_dir="dist/release"
          readonly portable_exe="v2rayn-widget-${VERSION}-windows-x64-portable.exe"
          readonly portable_zip="v2rayn-widget-${VERSION}-windows-x64-portable.zip"
          readonly installer_exe="v2rayn-widget-${VERSION}-windows-x64-setup.exe"
          readonly checksum_file="SHA256SUMS.txt"
          readonly expected_assets=("$portable_exe" "$portable_zip" "$installer_exe" "$checksum_file")

          for asset in "${expected_assets[@]}"; do
            if [[ ! -f "$distribution_dir/$asset" ]]; then
              echo "Missing expected release asset: $asset" >&2
              exit 1
            fi
          done

          actual_count="$(find "$distribution_dir" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "$actual_count" != "${#expected_assets[@]}" ]]; then
            echo "Unexpected files found in release distribution" >&2
            find "$distribution_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi

          (cd "$distribution_dir" && sha256sum --check "$checksum_file")
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

          for asset in "${expected_assets[@]}"; do
            gh release upload "$RELEASE_TAG" "$distribution_dir/$asset" --repo "$GITHUB_REPOSITORY" --clobber
          done
