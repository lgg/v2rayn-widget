name: Release Quality

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, v2rayn-widget-ci]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm self-hosted runner assignment
        shell: pwsh
        run: |
          Write-Host "Runner name: ${{ runner.name }}"
          Write-Host "Runner OS: ${{ runner.os }}"
          Write-Host "Runner architecture: ${{ runner.arch }}"
          if ("${{ runner.environment }}" -ne "self-hosted") {
            throw "Release Quality must run on the self-hosted v2rayn-widget-ci runner"
          }

      - name: Set up Python for workflow contract tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify workflow contracts
        shell: pwsh
        run: python scripts/test_workflow_contracts.py

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.17.1
          package-manager-cache: false

      - name: Install frontend dependencies
        id: frontend_install
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          $env:NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
          $env:NPM_CONFIG_CACHE = Join-Path $env:RUNNER_TEMP "npm-cache"
          node --version 2>&1 | Tee-Object -FilePath frontend-install-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm --version 2>&1 | Tee-Object -FilePath frontend-install-output.txt -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm cache clean --force 2>&1 | Tee-Object -FilePath frontend-install-output.txt -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm ci --no-audit --no-fund 2>&1 | Tee-Object -FilePath frontend-install-output.txt -Append
          exit $LASTEXITCODE

      - name: Audit frontend dependencies
        if: steps.frontend_install.outcome == 'success'
        id: frontend_audit
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          $env:NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
          $env:NPM_CONFIG_CACHE = Join-Path $env:RUNNER_TEMP "npm-cache"
          npm audit --audit-level=high 2>&1 | Tee-Object -FilePath frontend-audit-output.txt
          exit $LASTEXITCODE

      - name: Run frontend tests
        if: steps.frontend_install.outcome == 'success'
        id: frontend_tests
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath frontend-test-output.txt
          exit $LASTEXITCODE

      - name: Build frontend
        if: steps.frontend_install.outcome == 'success'
        id: frontend_build
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath frontend-build-output.txt
          exit $LASTEXITCODE

      - name: Upload frontend distribution
        if: steps.frontend_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist
          if-no-files-found: error
          retention-days: 1

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics
          path: |
            src/frontend/frontend-install-output.txt
            src/frontend/frontend-audit-output.txt
            src/frontend/frontend-test-output.txt
            src/frontend/frontend-build-output.txt
            ${{ runner.temp }}/npm-cache/_logs/*.log
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when frontend checks failed
        if: steps.frontend_install.outcome == 'failure' || steps.frontend_audit.outcome == 'failure' || steps.frontend_tests.outcome == 'failure' || steps.frontend_build.outcome == 'failure'
        shell: pwsh
        run: exit 1

      - name: Cleanup frontend workspace
        if: always()
        shell: pwsh
        run: |
          Remove-Item "src/frontend/node_modules" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src/frontend/dist" -Recurse -Force -ErrorAction SilentlyContinue

  rust-windows:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository)
    needs: frontend
    runs-on: [self-hosted, v2rayn-widget-ci]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm self-hosted runner assignment
        shell: pwsh
        run: |
          Write-Host "Runner name: ${{ runner.name }}"
          Write-Host "Runner OS: ${{ runner.os }}"
          Write-Host "Runner architecture: ${{ runner.arch }}"
          if ("${{ runner.environment }}" -ne "self-hosted") {
            throw "Release Quality must run on the self-hosted v2rayn-widget-ci runner"
          }

      - name: Download frontend distribution
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist

      - name: Set up Node.js for installer smoke
        uses: actions/setup-node@v6
        with:
          node-version: 22.17.1
          package-manager-cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check all Rust formatting
        id: rust_format
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo fmt --all -- --check 2>&1 | Tee-Object -FilePath rust-format-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Run Rust tests
        id: rust_tests
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo test --locked 2>&1 | Tee-Object -FilePath rust-test-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Run Rust clippy
        id: rust_clippy
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo clippy --locked --all-targets -- -D warnings 2>&1 | Tee-Object -FilePath rust-clippy-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Run release configuration Clippy
        id: rust_release_clippy
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo clippy --locked --release --no-default-features -- -D warnings 2>&1 | Tee-Object -FilePath rust-release-clippy-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Check Rust build
        id: rust_build
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo check --locked 2>&1 | Tee-Object -FilePath rust-build-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Build portable release smoke artifact
        id: rust_release
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo build --release --locked 2>&1 | Tee-Object -FilePath rust-release-output.txt
          $commandExitCode = $LASTEXITCODE
          if ($commandExitCode -ne 0) { exit $commandExitCode }
          if (-not (Test-Path "target/release/v2rayn-widget.exe")) {
            Write-Error "Release executable was not produced"
            exit 1
          }

      - name: Upload portable release smoke artifact
        if: steps.rust_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: portable-release-smoke
          path: src/tauri/target/release/v2rayn-widget.exe
          if-no-files-found: error
          retention-days: 1

      - name: Install frontend dependencies for installer smoke
        id: installer_dependencies
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          $env:NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
          $env:NPM_CONFIG_CACHE = Join-Path $env:RUNNER_TEMP "npm-installer-cache"
          npm cache clean --force 2>&1 | Tee-Object -FilePath installer-dependencies-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm ci --no-audit --no-fund 2>&1 | Tee-Object -FilePath installer-dependencies-output.txt -Append
          exit $LASTEXITCODE

      - name: Build NSIS installer smoke artifact
        if: steps.installer_dependencies.outcome == 'success'
        id: installer_release
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          $tauriCli = (Resolve-Path "../frontend/node_modules/.bin/tauri.cmd").Path
          & $tauriCli build --bundles nsis --config "tauri.installer.conf.json" --ci -- --locked 2>&1 | Tee-Object -FilePath installer-release-output.txt
          $commandExitCode = $LASTEXITCODE
          if ($commandExitCode -ne 0) { exit $commandExitCode }
          $installers = @(Get-ChildItem "target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue)
          if ($installers.Count -eq 0) {
            Write-Error "NSIS installer was not produced"
            exit 1
          }

      - name: Upload NSIS installer smoke artifact
        if: steps.installer_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nsis-installer-smoke
          path: src/tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-diagnostics
          path: |
            src/tauri/rust-format-output.txt
            src/tauri/rust-test-output.txt
            src/tauri/rust-clippy-output.txt
            src/tauri/rust-release-clippy-output.txt
            src/tauri/rust-build-output.txt
            src/tauri/rust-release-output.txt
            src/frontend/installer-dependencies-output.txt
            src/tauri/installer-release-output.txt
            ${{ runner.temp }}/npm-installer-cache/_logs/*.log
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when Rust checks failed
        if: steps.rust_format.outcome == 'failure' || steps.rust_tests.outcome == 'failure' || steps.rust_clippy.outcome == 'failure' || steps.rust_release_clippy.outcome == 'failure' || steps.rust_build.outcome == 'failure' || steps.rust_release.outcome == 'failure' || steps.installer_dependencies.outcome == 'failure' || steps.installer_release.outcome == 'failure'
        shell: pwsh
        run: exit 1

      - name: Cleanup Rust and installer workspace
        if: always()
        shell: pwsh
        run: |
          Remove-Item "src/frontend/node_modules" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src/frontend/dist" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "src/tauri/target" -Recurse -Force -ErrorAction SilentlyContinue
