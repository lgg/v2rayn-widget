name: Apply Full Audit Patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'audit/0018-full-project-screen-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact audit branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reconstruct and verify patch
        shell: bash
        run: |
          cat .github/audit/0018-part*.b64 | tr -d '[:space:]' > /tmp/0018.patch.gz.b64
          base64 --decode /tmp/0018.patch.gz.b64 | gzip -d > /tmp/0018.patch
          printf '%s  %s\n' 'c5ca002d865ccd42e29f324f1e59765e6acc54a70a8495846da3ce02ad656733' /tmp/0018.patch | sha256sum --check -
          git apply --check /tmp/0018.patch
          git apply /tmp/0018.patch

      - name: Format Rust
        run: cargo fmt --all --manifest-path src/tauri/Cargo.toml

      - name: Remove temporary audit transport
        shell: bash
        run: |
          rm -rf .github/audit
          rm -f .github/workflows/apply-full-audit-patch.yml

      - name: Commit full audit implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "0018: harden full project and screen flows"
          git push origin HEAD:${{ github.head_ref }}
