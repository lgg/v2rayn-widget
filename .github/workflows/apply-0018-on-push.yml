name: Apply 0018 Final Fixes

on:
  push:
    branches:
      - audit/0018-full-project-screen-audit

permissions:
  contents: write

concurrency:
  group: apply-0018-final
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: audit/0018-full-project-screen-audit
          fetch-depth: 0

      - name: Apply exact verified replacements
        shell: python
        run: |
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace('src/tauri/src/commands/mod.rs', '        settings_normalization::{\n            normalize_diagnostics_url, normalize_endpoint_list, normalize_optional_path,\n            normalize_settings,\n        },\n', '        settings_normalization::{\n            normalize_diagnostics_url, normalize_optional_path, normalize_settings,\n        },\n')
          replace('src/tauri/src/commands/mod.rs', '};\n\nconst UIPI_MISMATCH_PREFIX', '};\n\n#[cfg(test)]\nuse crate::utils::settings_normalization::normalize_endpoint_list;\n\nconst UIPI_MISMATCH_PREFIX')
          replace('src/tauri/src/commands/mod.rs', '        let fallback = vec!["https://fallback.example".to_owned()];\n        let result = normalize_endpoint_list(vec!["not a url".to_owned()], fallback.clone());\n\n        assert_eq!(result, fallback);\n', '        let fallback = vec!["https://fallback.example".to_owned()];\n        let result = normalize_endpoint_list(vec!["not a url".to_owned()], fallback);\n\n        assert_eq!(result, vec!["https://fallback.example/".to_owned()]);\n')
          replace('src/tauri/src/utils/settings_normalization.rs', 'pub fn is_allowed_http_endpoint(value: &str) -> bool {\n', '#[cfg(test)]\npub fn is_allowed_http_endpoint(value: &str) -> bool {\n')
          replace('src/tauri/src/models/settings.rs', '        "https://api.ipify.org?format=json".to_owned(),\n        "https://ifconfig.me/ip".to_owned(),\n        "https://icanhazip.com".to_owned(),\n', '        "https://api.ipify.org/?format=json".to_owned(),\n        "https://ifconfig.me/ip".to_owned(),\n        "https://icanhazip.com/".to_owned(),\n')
          replace('src/frontend/src/app/SettingsWindow.tsx', 'const DEFAULT_IP_ENDPOINTS = ["https://api.ipify.org?format=json", "https://ifconfig.me/ip", "https://icanhazip.com"];\n', 'const DEFAULT_IP_ENDPOINTS = ["https://api.ipify.org/?format=json", "https://ifconfig.me/ip", "https://icanhazip.com/"];\n')

      - name: Restore permanent workflow, format, verify and push
        shell: bash
        run: |
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/windows-quality.yml
          rm -f .github/workflows/apply-0018-on-push.yml
          cargo fmt --all --manifest-path src/tauri/Cargo.toml
          git diff --check
          grep -F 'https://api.ipify.org/?format=json' src/tauri/src/models/settings.rs
          grep -F '#[cfg(test)]' src/tauri/src/utils/settings_normalization.rs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "0018: fix canonical endpoint verification"
          git push origin HEAD:audit/0018-full-project-screen-audit
