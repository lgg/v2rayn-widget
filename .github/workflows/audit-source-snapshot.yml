name: Audit Source Snapshot

on:
  pull_request:
    paths:
      - 'project-tracking/tasks/0014-post-merge-deep-audit.md'
      - '.github/workflows/audit-source-snapshot.yml'

permissions:
  contents: read

jobs:
  snapshot:
    if: github.event.pull_request.head.ref == 'audit/0014-post-merge-hardening'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout audited branch
        uses: actions/checkout@v4

      - name: Remove Git metadata
        run: rm -rf .git

      - name: Upload exact source tree
        uses: actions/upload-artifact@v4
        with:
          name: audit-source-snapshot
          path: .
          include-hidden-files: true
          retention-days: 1
