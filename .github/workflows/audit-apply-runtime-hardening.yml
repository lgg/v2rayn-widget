name: Audit Apply Runtime Hardening

on:
  push:
    branches:
      - audit/0016-post-merge-runtime-hardening

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Verify and apply audit patch
        shell: bash
        run: |
          base64 --decode .github/audit/runtime-hardening.patch.gz.b64 > /tmp/runtime-hardening.patch.gz
          echo "4cfbeb55b200a30f2c211857f8aca21deba57c79c7a37ff2a07cca0eddc6ac51  /tmp/runtime-hardening.patch.gz" | sha256sum --check --strict
          gzip --decompress --stdout /tmp/runtime-hardening.patch.gz > /tmp/runtime-hardening.patch
          patch --strip=1 --dry-run < /tmp/runtime-hardening.patch
          patch --strip=1 < /tmp/runtime-hardening.patch
          cargo fmt --manifest-path src/tauri/Cargo.toml --all

      - name: Commit formatted runtime hardening
        shell: bash
        run: |
          rm -f .github/audit/runtime-hardening.patch.gz.b64
          rm -f .github/workflows/audit-source-snapshot.yml
          rm -f .github/workflows/audit-apply-runtime-hardening.yml
          rmdir .github/audit 2>/dev/null || true
          git config user.name "lgg"
          git config user.email "lgg@users.noreply.github.com"
          git add --all
          git diff --cached --check
          git commit -m "fix(runtime): harden selected v2rayN instance control"
          git push origin HEAD:audit/0016-post-merge-runtime-hardening
