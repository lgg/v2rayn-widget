name: Finalize 0014 Security Hardening

on:
  pull_request:
    paths:
      - '.github/workflows/finalize-0014-security.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'audit/0014-post-merge-hardening'
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/0014-post-merge-hardening
          fetch-depth: 0

      - name: Set up rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format security fix
        working-directory: src/tauri
        shell: pwsh
        run: |
          rustfmt --edition 2021 --config skip_children=true src/services/health_check.rs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Synchronize audit documentation
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              content = file.read_text(encoding='utf-8')
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one occurrence, found {count}: {old!r}')
              file.write_text(content.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'README.md',
              'Legacy v2rayN commands remain registered during staged migration so existing debug/control workflows are not removed in this refactor.\n',
              'Legacy v2rayN commands remain registered during staged migration so existing debug/control workflows are not removed in this refactor.\n\nNetwork diagnostics reject non-public literal and DNS-resolved targets, disable redirects and ambient proxy settings, and pin hostname requests to the exact public socket addresses that were validated before the request.\n',
          )
          replace_once(
              'README.md',
              'The Windows Quality workflow additionally:',
              'The Release Quality workflow additionally:',
          )
          replace_once(
              'docs/architecture.md',
              'Network diagnostics disable redirects and resolve each configured HTTP(S) endpoint before requesting it. Literal or resolved loopback, private, link-local, CGNAT, benchmark, documentation, multicast and reserved addresses are rejected. This keeps v2rayN and Happ diagnostics from following a configured endpoint into a local network target.',
              'Network diagnostics disable redirects and ambient proxy settings, resolve each configured HTTP(S) endpoint, reject the endpoint if any answer is non-public, and pin hostname requests to the exact validated `SocketAddr` set with `reqwest::ClientBuilder::resolve_to_addrs`. This removes the second unvalidated DNS lookup that could otherwise permit DNS rebinding. Literal or resolved loopback, private, link-local, CGNAT, benchmark, documentation, multicast, reserved, NAT64, Teredo and 6to4 addresses are rejected.',
          )
          replace_once(
              'project-tracking/reports/0014-post-merge-deep-audit-report.md',
              'Configured hostnames were filtered syntactically, but a hostname could resolve to a local/reserved address and redirects were followed by default. Requests now disable redirects and verify every literal or DNS-resolved address before connecting. Loopback, private, link-local, CGNAT, benchmark, documentation, multicast and reserved ranges are rejected.',
              'Configured hostnames were filtered syntactically, but a hostname could resolve to a local/reserved address, redirects were followed by default, and the HTTP client performed a second DNS lookup after validation. Requests now disable redirects and ambient proxy settings, reject an endpoint if any resolved address is non-public, and pin the request to the exact validated socket-address set. Loopback, private, link-local, CGNAT, benchmark, documentation, multicast, reserved, NAT64, Teredo and 6to4 ranges are rejected.',
          )
          replace_once(
              'project-tracking/reports/0014-post-merge-deep-audit-report.md',
              '- Rust unit/regression tests: 46 passed, 0 failed;',
              '- Rust unit/regression tests: 48 passed, 0 failed;',
          )
          replace_once(
              'project-tracking/tasks/0014-post-merge-deep-audit.md',
              '- diagnostic hostnames could resolve to local/reserved addresses, and redirects were followed without revalidation;',
              '- diagnostic hostnames could resolve to local/reserved addresses, redirects were followed, and a second unpinned DNS lookup remained possible after validation;',
          )
          replace_once(
              'project-tracking/tasks/0014-post-merge-deep-audit.md',
              '- [x] Rust unit/regression suite passes: 46 tests.',
              '- [x] Rust unit/regression suite passes: 48 tests.',
          )

      - name: Commit final audit fixes
        shell: pwsh
        run: |
          git diff --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git config user.name 'lgg'
          git config user.email 'lgg@users.noreply.github.com'
          git add README.md docs/architecture.md project-tracking/tasks/0014-post-merge-deep-audit.md project-tracking/reports/0014-post-merge-deep-audit-report.md src/tauri/src/services/health_check.rs
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m '0014: close DNS rebinding gap and sync audit docs'
          git push origin HEAD:audit/0014-post-merge-hardening
