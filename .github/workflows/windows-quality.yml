name: Apply 0018 Clippy Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'audit/0018-full-project-screen-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout exact audit branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact rollback-preserving fix
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/tauri/src/commands/mod.rs')
          content = path.read_text(encoding='utf-8')
          old = '''        set_all_windows_always_on_top(app, next.always_on_top).map_err(|error| {
            let _ = set_all_windows_always_on_top(app, previous.always_on_top);
            error
        })?;
'''
          new = '''        set_all_windows_always_on_top(app, next.always_on_top).inspect_err(|_| {
            let _ = set_all_windows_always_on_top(app, previous.always_on_top);
        })?;
'''
          if content.count(old) != 1:
              raise SystemExit(f'expected one exact match, found {content.count(old)}')
          path.write_text(content.replace(old, new), encoding='utf-8')

      - name: Restore permanent workflow and push product fix
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          git checkout origin/main -- .github/workflows/windows-quality.yml
          cargo fmt --all --manifest-path src/tauri/Cargo.toml
          git diff --check
          grep -F 'inspect_err(|_|' src/tauri/src/commands/mod.rs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m '0018: preserve rollback with inspect_err'
          git push origin HEAD:${{ github.head_ref }}
