name: Build Release Assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build when no release tag is supplied
        required: true
        default: main
        type: string
      release_tag:
        description: Existing release tag to build and attach assets to (optional)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-assets-${{ github.event.release.tag_name || inputs.release_tag || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      version: ${{ steps.metadata.outputs.version }}
    env:
      BUILD_REF: ${{ github.event.release.tag_name || inputs.release_tag || inputs.ref }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}

    steps:
      - name: Checkout exact release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.17.1
          package-manager-cache: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve and verify release version
        id: metadata
        shell: pwsh
        run: |
          $metadata = cargo metadata --manifest-path src/tauri/Cargo.toml --no-deps --format-version 1 | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
            throw "Could not read Cargo package metadata"
          }

          $package = $metadata.packages | Where-Object { $_.name -eq "v2rayn-widget" } | Select-Object -First 1
          if (-not $package) {
            throw "v2rayn-widget package was not found in Cargo metadata"
          }

          $cargoVersion = $package.version
          $tauriVersion = (Get-Content src/tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          if ($cargoVersion -ne $tauriVersion) {
            throw "Cargo version $cargoVersion does not match Tauri version $tauriVersion"
          }

          if ($env:RELEASE_TAG) {
            if ($env:RELEASE_TAG -notmatch '^v?(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$') {
              throw "Release tag '$env:RELEASE_TAG' must be a semantic version such as v1.2.3"
            }
            $tagVersion = $Matches[1]
            if ($tagVersion -ne $cargoVersion) {
              throw "Release tag version $tagVersion does not match application version $cargoVersion"
            }
            $assetLabel = $env:RELEASE_TAG
          }
          else {
            $assetLabel = "v$($cargoVersion)-manual-$env:GITHUB_RUN_NUMBER"
          }

          $safeAssetLabel = $assetLabel -replace '[^0-9A-Za-z._-]', '-'
          $artifactName = "release-assets-$safeAssetLabel"
          "version=$cargoVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "artifact_name=$artifactName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_tag=$env:RELEASE_TAG" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install and audit frontend dependencies
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm config set registry "https://registry.npmjs.org/" --global
          npm config set cache "$env:RUNNER_TEMP\npm-release-cache" --global
          npm cache clean --force
          npm ci --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm audit --audit-level=high
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build frontend distribution
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm run build
          exit $LASTEXITCODE

      - name: Build portable Windows executable
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo build --release --locked
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (-not (Test-Path "target/release/v2rayn-widget.exe")) {
            throw "Portable release executable was not produced"
          }

      - name: Build NSIS installer
        working-directory: src/tauri
        shell: pwsh
        run: |
          $tauriCli = (Resolve-Path "../frontend/node_modules/.bin/tauri.cmd").Path
          & $tauriCli build --bundles nsis --config "tauri.installer.conf.json" --ci -- --locked
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $installers = @(Get-ChildItem "target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue)
          if ($installers.Count -eq 0) {
            throw "NSIS installer was not produced"
          }

      - name: Stage distribution files and checksums
        shell: pwsh
        run: |
          $version = "${{ steps.metadata.outputs.version }}"
          $distributionDir = Join-Path $env:GITHUB_WORKSPACE "dist/release"
          if (Test-Path $distributionDir) {
            Remove-Item $distributionDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $distributionDir -Force | Out-Null

          $portableSource = Join-Path $env:GITHUB_WORKSPACE "src/tauri/target/release/v2rayn-widget.exe"
          $portableName = "v2rayn-widget-$version-windows-x64-portable.exe"
          $portableTarget = Join-Path $distributionDir $portableName
          Copy-Item $portableSource $portableTarget -Force

          $portableZip = Join-Path $distributionDir "v2rayn-widget-$version-windows-x64-portable.zip"
          Compress-Archive -Path $portableTarget -DestinationPath $portableZip -CompressionLevel Optimal -Force

          $installerSource = Get-ChildItem (Join-Path $env:GITHUB_WORKSPACE "src/tauri/target/release/bundle/nsis/*.exe") |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installerSource) {
            throw "NSIS installer could not be selected for staging"
          }
          $installerTarget = Join-Path $distributionDir "v2rayn-widget-$version-windows-x64-setup.exe"
          Copy-Item $installerSource.FullName $installerTarget -Force

          $checksumLines = Get-ChildItem $distributionDir -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash *$($_.Name)"
            }
          $checksumLines | Set-Content (Join-Path $distributionDir "SHA256SUMS.txt") -Encoding ascii

          Get-ChildItem $distributionDir -File | Select-Object Name, Length

      - name: Upload release distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: dist/release/*
          if-no-files-found: error
          retention-days: 30

  publish-release:
    if: needs.build-windows.outputs.release_tag != ''
    needs: build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.build-windows.outputs.release_tag }}
      VERSION: ${{ needs.build-windows.outputs.version }}

    steps:
      - name: Download verified release distribution
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-windows.outputs.artifact_name }}
          path: dist/release

      - name: Verify and attach files to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          readonly distribution_dir="dist/release"
          readonly portable_exe="v2rayn-widget-${VERSION}-windows-x64-portable.exe"
          readonly portable_zip="v2rayn-widget-${VERSION}-windows-x64-portable.zip"
          readonly installer_exe="v2rayn-widget-${VERSION}-windows-x64-setup.exe"
          readonly checksum_file="SHA256SUMS.txt"
          readonly expected_assets=("$portable_exe" "$portable_zip" "$installer_exe" "$checksum_file")

          for asset in "${expected_assets[@]}"; do
            if [[ ! -f "$distribution_dir/$asset" ]]; then
              echo "Missing expected release asset: $asset" >&2
              exit 1
            fi
          done

          actual_count="$(find "$distribution_dir" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "$actual_count" != "${#expected_assets[@]}" ]]; then
            echo "Unexpected files found in release distribution" >&2
            find "$distribution_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi

          (cd "$distribution_dir" && sha256sum --check "$checksum_file")
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

          for asset in "${expected_assets[@]}"; do
            gh release upload "$RELEASE_TAG" "$distribution_dir/$asset" --repo "$GITHUB_REPOSITORY" --clobber
          done
