name: Windows Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.17.1
          package-manager-cache: false

      - name: Install frontend dependencies
        id: frontend_install
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          node --version 2>&1 | Tee-Object -FilePath frontend-install-output.txt
          npm --version 2>&1 | Tee-Object -Append -FilePath frontend-install-output.txt
          npm config set registry "https://registry.npmjs.org/" --global
          npm config set cache "$env:RUNNER_TEMP/npm-cache" --global
          npm cache clean --force 2>&1 | Tee-Object -Append -FilePath frontend-install-output.txt
          npm ci --no-audit --no-fund 2>&1 | Tee-Object -Append -FilePath frontend-install-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Audit frontend dependencies
        if: steps.frontend_install.outcome == 'success'
        id: frontend_audit
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm audit --audit-level=high 2>&1 | Tee-Object -FilePath frontend-audit-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Run frontend tests
        if: steps.frontend_install.outcome == 'success'
        id: frontend_tests
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath frontend-test-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Build frontend
        if: steps.frontend_install.outcome == 'success'
        id: frontend_build
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath frontend-build-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Upload frontend distribution
        if: steps.frontend_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist
          if-no-files-found: error
          retention-days: 1

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics
          path: |
            src/frontend/frontend-install-output.txt
            src/frontend/frontend-audit-output.txt
            src/frontend/frontend-test-output.txt
            src/frontend/frontend-build-output.txt
            ${{ runner.temp }}/npm-cache/_logs/*.log
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when frontend checks failed
        if: steps.frontend_install.outcome == 'failure' || steps.frontend_audit.outcome == 'failure' || steps.frontend_tests.outcome == 'failure' || steps.frontend_build.outcome == 'failure'
        shell: pwsh
        run: exit 1

  rust:
    needs: frontend
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend distribution
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: src/frontend/dist

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check changed Rust formatting
        id: rust_format
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          rustfmt --edition 2021 --check --config skip_children=true src/main.rs src/adapters/mod.rs src/adapters/happ.rs src/adapters/v2rayn.rs src/client_commands.rs src/commands/mod.rs src/models/client.rs src/models/settings.rs src/models/status.rs src/services/config_reader.rs src/services/happ_ui.rs src/services/ui_controller.rs src/state/app_state.rs src/utils/settings_store.rs 2>&1 | Tee-Object -FilePath rust-format-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Run Rust tests
        id: rust_tests
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo test --locked 2>&1 | Tee-Object -FilePath rust-test-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Run Rust clippy
        id: rust_clippy
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo clippy --locked --all-targets -- -D warnings 2>&1 | Tee-Object -FilePath rust-clippy-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Check Rust build
        id: rust_build
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo check --locked 2>&1 | Tee-Object -FilePath rust-build-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Build portable release smoke artifact
        id: rust_release
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo build --release --locked 2>&1 | Tee-Object -FilePath rust-release-output.txt
          $commandExitCode = $LASTEXITCODE
          if ($commandExitCode -ne 0) { exit $commandExitCode }
          if (-not (Test-Path "target/release/v2rayn-widget.exe")) {
            Write-Error "Release executable was not produced"
            exit 1
          }

      - name: Upload portable release smoke artifact
        if: steps.rust_release.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: portable-release-smoke
          path: src/tauri/target/release/v2rayn-widget.exe
          if-no-files-found: error
          retention-days: 1

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-diagnostics
          path: |
            src/tauri/rust-format-output.txt
            src/tauri/rust-test-output.txt
            src/tauri/rust-clippy-output.txt
            src/tauri/rust-build-output.txt
            src/tauri/rust-release-output.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when Rust checks failed
        if: steps.rust_format.outcome == 'failure' || steps.rust_tests.outcome == 'failure' || steps.rust_clippy.outcome == 'failure' || steps.rust_build.outcome == 'failure' || steps.rust_release.outcome == 'failure'
        shell: pwsh
        run: exit 1
