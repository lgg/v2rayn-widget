name: Apply 0018 Clippy Fixes

on:
  push:
    branches:
      - audit/0018-full-project-screen-audit

permissions:
  contents: write

concurrency:
  group: apply-0018-clippy
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: audit/0018-full-project-screen-audit
          fetch-depth: 0

      - name: Apply exact Clippy fixes
        shell: python
        run: |
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"Expected one match in {path}, found {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          replace('src/tauri/src/commands/mod.rs', '        set_all_windows_always_on_top(app, next.always_on_top).map_err(|error| {\n            let _ = set_all_windows_always_on_top(app, previous.always_on_top);\n            error\n        })?;\n', '        set_all_windows_always_on_top(app, next.always_on_top).inspect_err(|_| {\n            let _ = set_all_windows_always_on_top(app, previous.always_on_top);\n        })?;\n')
          replace('src/tauri/src/services/status_service.rs', '    let status = match connection_state {\n        ConnectionState::Connected => ConnectionState::Connected,\n        ConnectionState::Disconnected => ConnectionState::Disconnected,\n        ConnectionState::Error => ConnectionState::Error,\n        ConnectionState::Connecting => ConnectionState::Connecting,\n        ConnectionState::Unknown => ConnectionState::Unknown,\n    };\n', '    let status = connection_state;\n')

      - name: Format, verify, remove applicator and push
        shell: bash
        run: |
          rm -f .github/workflows/apply-0018-clippy-on-push.yml
          cargo fmt --all --manifest-path src/tauri/Cargo.toml
          git diff --check
          grep -F '.inspect_err(|_|' src/tauri/src/commands/mod.rs
          grep -F 'let status = connection_state;' src/tauri/src/services/status_service.rs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "0018: satisfy strict Rust lints"
          git push origin HEAD:audit/0018-full-project-screen-audit
