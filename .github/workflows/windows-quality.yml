name: Apply Audited Rustfmt

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: apply-audited-rustfmt-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up Rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format audited Rust sources
        working-directory: src/tauri
        shell: pwsh
        run: |
          rustfmt --edition 2021 --config skip_children=true src/main.rs src/adapters/mod.rs src/adapters/happ.rs src/adapters/v2rayn.rs src/client_commands.rs src/commands/mod.rs src/models/client.rs src/models/settings.rs src/models/status.rs src/services/config_reader.rs src/services/happ_ui.rs src/services/ui_controller.rs src/state/app_state.rs src/utils/settings_store.rs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit formatting
        shell: pwsh
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tauri
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No formatting changes"
            exit 0
          }
          git commit -m "style: format audited Rust sources"
          git push origin "HEAD:$env:HEAD_BRANCH"
