name: Fix Audit Clippy Findings

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'audit/0017-final-post-merge-audit'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact cleanup
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/tauri/src/services/ui_controller.rs")
          content = path.read_text(encoding="utf-8")
          replacements = [
              (
                  "        candidates.sort_by(|left, right| right.score.cmp(&left.score));",
                  "        candidates.sort_by_key(|candidate| std::cmp::Reverse(candidate.score));",
              ),
              (
                  "                .split(|character| matches!(character, '\\n' | '\\r' | '\\t'))",
                  "                .split(['\\n', '\\r', '\\t'])",
              ),
              (
                  "#[cfg(target_os = \"windows\")]\npub fn click_reload_via_ui(target_pid: Option<u32>) -> Result<String> {\n    windows_impl::click_reload_via_ui(target_pid)\n}\n\n#[cfg(not(target_os = \"windows\"))]\npub fn click_reload_via_ui(_target_pid: Option<u32>) -> Result<String> {\n    Err(anyhow!(\"UI automation is only available on Windows\"))\n}\n\n",
                  "",
              ),
          ]

          for old, new in replacements:
              if content.count(old) != 1:
                  raise SystemExit(f"Expected exactly one match, found {content.count(old)}: {old!r}")
              content = content.replace(old, new)

          path.write_text(content, encoding="utf-8", newline="\n")

      - name: Format Rust
        run: cargo fmt --all --manifest-path src/tauri/Cargo.toml

      - name: Remove temporary workflow
        shell: bash
        run: rm -f .github/workflows/fix-clippy-0017.yml

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix: resolve final audit clippy findings"
          git push origin HEAD:${{ github.head_ref }}
