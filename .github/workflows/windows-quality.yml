name: Apply Final Audit Fixes

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: apply-final-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply final audited patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check --directory=src .audit/final-race-clippy.patch
          git apply --whitespace=fix --directory=src .audit/final-race-clippy.patch
          rm -rf .audit

      - name: Commit final audited changes
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "fix: serialize settings updates and satisfy strict clippy"
          git push origin "HEAD:${HEAD_BRANCH}"
