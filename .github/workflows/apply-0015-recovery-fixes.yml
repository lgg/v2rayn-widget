name: Apply 0015 Recovery Fixes

on:
  pull_request:
    paths:
      - '.github/workflows/apply-0015-recovery-fixes.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'audit/0015-final-main-verification'
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/0015-final-main-verification
          fetch-depth: 0

      - name: Set up rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Verify and apply exact recovery payload
        shell: python
        run: |
          import base64
          import hashlib
          import shutil
          import tarfile
          from pathlib import Path, PurePosixPath

          expected_sha = "97a9cab94867ab05f1d4195099af35380e338948d57dc7517ec58cdfad3c2840"
          expected_files = sorted([
              "src/frontend/src/features/dashboard-store.test.ts",
              "src/frontend/src/features/dashboard-store.ts",
              "src/tauri/src/services/config_reader.rs",
              "src/tauri/src/utils/file_store.rs",
              "src/tauri/src/utils/settings_store.rs",
              "src/tauri/tauri.installer.conf.json",
          ])

          encoded = "".join(
              path.read_text(encoding="utf-8")
              for path in sorted(Path(".audit/0015/recovery").glob("part*.b64"))
          )
          archive_bytes = base64.b64decode(encoded, validate=True)
          actual_sha = hashlib.sha256(archive_bytes).hexdigest()
          if actual_sha != expected_sha:
              raise SystemExit(f"recovery archive SHA mismatch: {actual_sha}")

          archive_path = Path(".audit/0015/recovery.tar.gz")
          archive_path.write_bytes(archive_bytes)
          with tarfile.open(archive_path, "r:gz") as archive:
              members = archive.getmembers()
              actual_files = sorted(member.name for member in members)
              if actual_files != expected_files:
                  raise SystemExit(f"unexpected recovery manifest: {actual_files}")
              for member in members:
                  path = PurePosixPath(member.name)
                  if member.isdir() or member.issym() or member.islnk() or path.is_absolute() or ".." in path.parts:
                      raise SystemExit(f"unsafe recovery member: {member.name}")
              archive.extractall(Path.cwd())

          shutil.rmtree(".audit")

      - name: Format and validate
        shell: pwsh
        run: |
          cargo fmt --manifest-path src/tauri/Cargo.toml --all
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          git diff --check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit recovery fixes
        shell: pwsh
        run: |
          git config user.name 'lgg'
          git config user.email 'lgg@users.noreply.github.com'
          git add -A
          git commit -m '0015: recover validated settings and config backups'
          git push origin HEAD:audit/0015-final-main-verification
