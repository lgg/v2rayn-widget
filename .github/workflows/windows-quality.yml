name: Windows Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: windows-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run frontend tests
        id: frontend_tests
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath frontend-test-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Build frontend
        id: frontend_build
        continue-on-error: true
        working-directory: src/frontend
        shell: pwsh
        run: |
          npm run build 2>&1 | Tee-Object -FilePath frontend-build-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics
          path: |
            src/frontend/frontend-test-output.txt
            src/frontend/frontend-build-output.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when frontend checks failed
        if: steps.frontend_tests.outcome == 'failure' || steps.frontend_build.outcome == 'failure'
        shell: pwsh
        run: exit 1

  rust:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        id: rust_format
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo fmt --all -- --check 2>&1 | Tee-Object -FilePath rust-format-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Run Rust tests
        id: rust_tests
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo test --locked 2>&1 | Tee-Object -FilePath rust-test-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Check Rust build
        id: rust_build
        continue-on-error: true
        working-directory: src/tauri
        shell: pwsh
        run: |
          cargo check --locked 2>&1 | Tee-Object -FilePath rust-build-output.txt
          $commandExitCode = $LASTEXITCODE
          exit $commandExitCode

      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-diagnostics
          path: |
            src/tauri/rust-format-output.txt
            src/tauri/rust-test-output.txt
            src/tauri/rust-build-output.txt
          if-no-files-found: warn
          retention-days: 1

      - name: Fail when Rust checks failed
        if: steps.rust_format.outcome == 'failure' || steps.rust_tests.outcome == 'failure' || steps.rust_build.outcome == 'failure'
        shell: pwsh
        run: exit 1
