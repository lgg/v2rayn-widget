name: Format 0014 Rust Sources

on:
  pull_request:
    paths:
      - '.github/workflows/format-0014-rust.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'audit/0014-post-merge-hardening'
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: audit/0014-post-merge-hardening
          fetch-depth: 0

      - name: Set up rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format audited Rust sources
        working-directory: src/tauri
        shell: pwsh
        run: |
          rustfmt --edition 2021 --config skip_children=true src/client_commands.rs src/commands/mod.rs src/services/config_reader.rs src/services/health_check.rs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Commit formatting
        shell: pwsh
        run: |
          git config user.name 'lgg'
          git config user.email 'lgg@users.noreply.github.com'
          git add src/tauri
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) { exit 0 }
          git commit -m '0014: format audited Rust sources'
          git push origin HEAD:audit/0014-post-merge-hardening
